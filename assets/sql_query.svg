<svg width="1200" height="440" viewBox="0 0 1200 440" xmlns="http://www.w3.org/2000/svg" font-family="'Consolas', 'Courier New', monospace">
  <rect width="1200" height="440" fill="#1e1e1e"/>
  <rect x="0" y="0" width="1200" height="30" fill="#3c3c3c"/>
  <text x="600" y="19" font-size="11" fill="#ccc" text-anchor="middle">sales-kpi-dashboard — Visual Studio Code</text>
  <circle cx="20" cy="15" r="6" fill="#ff5f57"/>
  <circle cx="38" cy="15" r="6" fill="#febc2e"/>
  <circle cx="56" cy="15" r="6" fill="#28c840"/>

  <!-- Tab bar with SQL file open -->
  <rect x="0" y="30" width="1200" height="28" fill="#2d2d2d"/>
  <rect x="0" y="30" width="210" height="28" fill="#1e1e1e"/>
  <text x="14" y="48" font-size="10" fill="#9cdcfe">01_revenue_by_region.sql</text>
  <text x="220" y="48" font-size="10" fill="#888">TERMINAL</text>

  <!-- SQL file editor (top half) -->
  <rect x="0" y="58" width="1200" height="180" fill="#1e1e1e"/>

  <!-- Line numbers -->
  <rect x="0" y="58" width="40" height="180" fill="#1e1e1e"/>
  <text x="32" y="78" font-size="11" fill="#555" text-anchor="end">1</text>
  <text x="32" y="96" font-size="11" fill="#555" text-anchor="end">2</text>
  <text x="32" y="114" font-size="11" fill="#555" text-anchor="end">3</text>
  <text x="32" y="132" font-size="11" fill="#555" text-anchor="end">4</text>
  <text x="32" y="150" font-size="11" fill="#555" text-anchor="end">5</text>
  <text x="32" y="168" font-size="11" fill="#555" text-anchor="end">6</text>
  <text x="32" y="186" font-size="11" fill="#555" text-anchor="end">7</text>
  <text x="32" y="204" font-size="11" fill="#555" text-anchor="end">8</text>
  <text x="32" y="222" font-size="11" fill="#555" text-anchor="end">9</text>

  <!-- SQL syntax highlighted code -->
  <text x="50" y="78" font-size="11" fill="#6a9955">-- 01_revenue_by_region.sql</text>
  <text x="50" y="96" font-size="11" fill="#6a9955">-- Total revenue and profit by region, ranked highest first.</text>
  <text x="50" y="114"><tspan fill="#c586c0">SELECT</tspan><tspan fill="#ccc">  region,</tspan></text>
  <text x="50" y="132"><tspan fill="#ccc">    </tspan><tspan fill="#dcdcaa">ROUND</tspan><tspan fill="#ccc">(</tspan><tspan fill="#dcdcaa">SUM</tspan><tspan fill="#ccc">(sales), 2)  </tspan><tspan fill="#c586c0">AS</tspan><tspan fill="#ccc"> total_revenue,</tspan></text>
  <text x="50" y="150"><tspan fill="#ccc">    </tspan><tspan fill="#dcdcaa">ROUND</tspan><tspan fill="#ccc">(</tspan><tspan fill="#dcdcaa">SUM</tspan><tspan fill="#ccc">(profit), 2) </tspan><tspan fill="#c586c0">AS</tspan><tspan fill="#ccc"> total_profit,</tspan></text>
  <text x="50" y="168"><tspan fill="#ccc">    </tspan><tspan fill="#dcdcaa">ROUND</tspan><tspan fill="#ccc">(</tspan><tspan fill="#dcdcaa">SUM</tspan><tspan fill="#ccc">(profit) * 100.0 / </tspan><tspan fill="#dcdcaa">NULLIF</tspan><tspan fill="#ccc">(</tspan><tspan fill="#dcdcaa">SUM</tspan><tspan fill="#ccc">(sales), 0), 2) </tspan><tspan fill="#c586c0">AS</tspan><tspan fill="#ccc"> profit_margin_pct,</tspan></text>
  <text x="50" y="186"><tspan fill="#ccc">    </tspan><tspan fill="#dcdcaa">COUNT</tspan><tspan fill="#ccc">(</tspan><tspan fill="#c586c0">DISTINCT</tspan><tspan fill="#ccc"> order_id) </tspan><tspan fill="#c586c0">AS</tspan><tspan fill="#ccc"> order_count</tspan></text>
  <text x="50" y="204"><tspan fill="#c586c0">FROM</tspan><tspan fill="#ccc"> sales</tspan></text>
  <text x="50" y="222"><tspan fill="#c586c0">GROUP BY</tspan><tspan fill="#ccc"> region  </tspan><tspan fill="#c586c0">ORDER BY</tspan><tspan fill="#ccc"> total_revenue </tspan><tspan fill="#c586c0">DESC</tspan><tspan fill="#ccc">;</tspan></text>

  <!-- Divider -->
  <line x1="0" y1="238" x2="1200" y2="238" stroke="#444" stroke-width="1"/>

  <!-- Terminal output area (bottom half) -->
  <rect x="0" y="238" width="1200" height="202" fill="#1e1e1e"/>
  <rect x="0" y="238" width="1200" height="24" fill="#2d2d2d"/>
  <text x="14" y="254" font-size="10" fill="#4ec9b0">TERMINAL</text>

  <!-- Terminal prompt and output -->
  <text x="14" y="278" font-size="11" fill="#4ec9b0">(.venv) PS C:\projects\sales-kpi-dashboard</text>
  <text x="430" y="278" font-size="11" fill="#ccc">&gt; python -m analysis.sql_runner 01_revenue_by_region</text>

  <!-- Query result table -->
  <text x="14" y="302" font-size="11" fill="#888">──── 01_revenue_by_region ────────────────────────────────────────────────</text>

  <!-- Header row -->
  <text x="14" y="322" font-size="11" fill="#dcdcaa">      region  total_revenue  total_profit  profit_margin_pct  order_count</text>
  <text x="14" y="338" font-size="11" fill="#888">────────────  ─────────────  ────────────  ─────────────────  ───────────</text>

  <!-- Data rows -->
  <text x="14" y="354" font-size="11" fill="#4ec9b0">        West     725457.82     93502.12              12.89         1617</text>
  <text x="14" y="370" font-size="11" fill="#ccc">        East     678781.24     91522.78              13.49         1520</text>
  <text x="14" y="386" font-size="11" fill="#ccc">     Central     501239.89     39706.36               7.92         1151</text>
  <text x="14" y="402" font-size="11" fill="#ccc">       South     391721.91     61665.73              15.74          721</text>

  <text x="14" y="426" font-size="11" fill="#4ec9b0">(.venv) PS C:\projects\sales-kpi-dashboard</text>
  <text x="430" y="426" font-size="11" fill="#ccc">&gt; <rect width="8" height="14" fill="#ccc" x="0" y="-12"/></text>
  <!-- Cursor -->
  <rect x="432" y="414" width="7" height="14" fill="#ccc" opacity="0.8"/>
</svg>
