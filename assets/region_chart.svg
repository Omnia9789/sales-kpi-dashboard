<svg width="1200" height="480" viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <rect width="1200" height="480" fill="#f0f2f6"/>
  <rect x="0" y="0" width="1200" height="40" fill="#262730"/>
  <circle cx="20" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="38" cy="20" r="6" fill="#febc2e"/>
  <circle cx="56" cy="20" r="6" fill="#28c840"/>
  <rect x="200" y="8" width="600" height="24" rx="4" fill="#1a1c26"/>
  <text x="500" y="24" font-size="11" fill="#888" text-anchor="middle">localhost:8501</text>
  <rect x="0" y="40" width="220" height="440" fill="#262730"/>
  <text x="16" y="80" font-size="13" fill="#fff" font-weight="600">Sales KPI Dashboard</text>

  <!-- Chart -->
  <text x="248" y="90" font-size="18" fill="#1f3864" font-weight="700">🗺️ Revenue by Region</text>
  <rect x="232" y="100" width="950" height="360" rx="8" fill="#fff" stroke="#e0e0e0" stroke-width="0.5"/>

  <!-- Y-axis labels -->
  <text x="340" y="130" font-size="10" fill="#aaa" text-anchor="middle">$0</text>
  <text x="510" y="130" font-size="10" fill="#aaa" text-anchor="middle">$200K</text>
  <text x="680" y="130" font-size="10" fill="#aaa" text-anchor="middle">$400K</text>
  <text x="850" y="130" font-size="10" fill="#aaa" text-anchor="middle">$600K</text>
  <text x="1020" y="130" font-size="10" fill="#aaa" text-anchor="middle">$800K</text>
  <text x="1150" y="130" font-size="10" fill="#aaa" text-anchor="middle">$1M</text>

  <!-- X axis line -->
  <line x1="340" y1="135" x2="1160" y2="135" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="510" y1="135" x2="510" y2="430" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="680" y1="135" x2="680" y2="430" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="850" y1="135" x2="850" y2="430" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="1020" y1="135" x2="1020" y2="430" stroke="#f0f0f0" stroke-width="1"/>
  <line x1="1150" y1="135" x2="1150" y2="430" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Group 1: West -->
  <text x="330" y="172" font-size="12" fill="#333" text-anchor="end" font-weight="600">West</text>
  <!-- Revenue bar -->
  <rect x="340" y="148" width="720" height="22" rx="3" fill="#2e75b6"/>
  <text x="1068" y="163" font-size="10" fill="#333">$725K</text>
  <!-- Profit bar -->
  <rect x="340" y="172" width="200" height="22" rx="3" fill="#70ad47"/>
  <text x="548" y="187" font-size="10" fill="#333">$93K</text>

  <!-- Group 2: East -->
  <text x="330" y="232" font-size="12" fill="#333" text-anchor="end" font-weight="600">East</text>
  <rect x="340" y="208" width="670" height="22" rx="3" fill="#2e75b6"/>
  <text x="1018" y="223" font-size="10" fill="#333">$678K</text>
  <rect x="340" y="232" width="220" height="22" rx="3" fill="#70ad47"/>
  <text x="568" y="247" font-size="10" fill="#333">$91K</text>

  <!-- Group 3: Central -->
  <text x="330" y="292" font-size="12" fill="#333" text-anchor="end" font-weight="600">Central</text>
  <rect x="340" y="268" width="495" height="22" rx="3" fill="#2e75b6"/>
  <text x="843" y="283" font-size="10" fill="#333">$501K</text>
  <rect x="340" y="292" width="58" height="22" rx="3" fill="#70ad47"/>
  <text x="406" y="307" font-size="10" fill="#333">$39K</text>

  <!-- Group 4: South -->
  <text x="330" y="352" font-size="12" fill="#333" text-anchor="end" font-weight="600">South</text>
  <rect x="340" y="328" width="388" height="22" rx="3" fill="#2e75b6"/>
  <text x="736" y="343" font-size="10" fill="#333">$391K</text>
  <rect x="340" y="352" width="155" height="22" rx="3" fill="#70ad47"/>
  <text x="503" y="367" font-size="10" fill="#333">$46K</text>

  <!-- Bottom line -->
  <line x1="340" y1="430" x2="1160" y2="430" stroke="#eee" stroke-width="1"/>

  <!-- Legend -->
  <rect x="700" y="400" width="14" height="14" rx="2" fill="#2e75b6"/>
  <text x="718" y="412" font-size="11" fill="#555">Revenue</text>
  <rect x="790" y="400" width="14" height="14" rx="2" fill="#70ad47"/>
  <text x="808" y="412" font-size="11" fill="#555">Profit</text>

  <!-- Metric cards under chart -->
  <rect x="232" y="470" width="220" height="0" rx="4" fill="#e8f0fb"/>
</svg>
