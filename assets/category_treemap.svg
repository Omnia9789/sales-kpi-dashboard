<svg width="1200" height="500" viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <rect width="1200" height="500" fill="#f0f2f6"/>
  <rect x="0" y="0" width="1200" height="40" fill="#262730"/>
  <circle cx="20" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="38" cy="20" r="6" fill="#febc2e"/>
  <circle cx="56" cy="20" r="6" fill="#28c840"/>
  <rect x="200" y="8" width="600" height="24" rx="4" fill="#1a1c26"/>
  <text x="500" y="24" font-size="11" fill="#888" text-anchor="middle">localhost:8501</text>
  <rect x="0" y="40" width="220" height="460" fill="#262730"/>
  <text x="16" y="80" font-size="13" fill="#fff" font-weight="600">Sales KPI Dashboard</text>

  <text x="248" y="88" font-size="18" fill="#1f3864" font-weight="700">📦 Revenue by Category</text>

  <!-- Treemap container -->
  <rect x="232" y="98" width="950" height="390" rx="8" fill="#fff" stroke="#e0e0e0" stroke-width="0.5"/>

  <!-- Technology block (largest) -->
  <rect x="238" y="104" width="560" height="370" rx="4" fill="#1565c0"/>
  <text x="518" y="195" font-size="18" fill="#fff" text-anchor="middle" font-weight="600">Technology</text>
  <text x="518" y="218" font-size="13" fill="#90caf9" text-anchor="middle">$836K</text>

  <!-- Technology sub-blocks -->
  <rect x="240" y="290" width="270" height="80" rx="3" fill="#1976d2"/>
  <text x="375" y="326" font-size="11" fill="#fff" text-anchor="middle">Phones</text>
  <text x="375" y="342" font-size="10" fill="#bbdefb" text-anchor="middle">$330K</text>

  <rect x="516" y="290" width="280" height="80" rx="3" fill="#1976d2"/>
  <text x="656" y="326" font-size="11" fill="#fff" text-anchor="middle">Machines</text>
  <text x="656" y="342" font-size="10" fill="#bbdefb" text-anchor="middle">$190K</text>

  <!-- Furniture block (medium) -->
  <rect x="804" y="104" width="370" height="190" rx="4" fill="#388e3c"/>
  <text x="989" y="188" font-size="16" fill="#fff" text-anchor="middle" font-weight="600">Furniture</text>
  <text x="989" y="208" font-size="12" fill="#a5d6a7" text-anchor="middle">$742K</text>

  <!-- Furniture sub-blocks -->
  <rect x="806" y="108" width="180" height="80" rx="3" fill="#43a047"/>
  <text x="896" y="144" font-size="10" fill="#fff" text-anchor="middle">Chairs</text>
  <text x="896" y="158" font-size="9" fill="#c8e6c9" text-anchor="middle">$328K</text>

  <rect x="992" y="108" width="180" height="80" rx="3" fill="#43a047"/>
  <text x="1082" y="144" font-size="10" fill="#fff" text-anchor="middle">Tables</text>
  <text x="1082" y="158" font-size="9" fill="#c8e6c9" text-anchor="middle">$206K</text>

  <!-- Office Supplies block -->
  <rect x="804" y="300" width="370" height="175" rx="4" fill="#f57c00"/>
  <text x="989" y="378" font-size="15" fill="#fff" text-anchor="middle" font-weight="600">Office Supplies</text>
  <text x="989" y="398" font-size="12" fill="#ffe0b2" text-anchor="middle">$719K</text>

  <!-- Office sub-blocks -->
  <rect x="806" y="302" width="175" height="75" rx="3" fill="#fb8c00"/>
  <text x="893" y="336" font-size="10" fill="#fff" text-anchor="middle">Storage</text>
  <text x="893" y="350" font-size="9" fill="#fff3e0" text-anchor="middle">$223K</text>

  <rect x="987" y="302" width="185" height="75" rx="3" fill="#fb8c00"/>
  <text x="1079" y="336" font-size="10" fill="#fff" text-anchor="middle">Binders</text>
  <text x="1079" y="350" font-size="9" fill="#fff3e0" text-anchor="middle">$203K</text>

  <!-- Color scale bar -->
  <defs>
    <linearGradient id="scaleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#bbdefb"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
  </defs>
  <rect x="400" y="458" width="200" height="12" rx="3" fill="url(#scaleGrad)"/>
  <text x="400" y="484" font-size="9" fill="#aaa">Low revenue</text>
  <text x="600" y="484" font-size="9" fill="#aaa" text-anchor="end">High revenue</text>
</svg>
